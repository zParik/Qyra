name: 'Build Windows, Linux, and macOS Apps'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-24.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            libfuse2t64

      - name: Install macOS targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install tesseract leptonica

      - name: Set macOS deployment target
        if: matrix.platform == 'macos-latest'
        run: echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
        shell: bash

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Qyra {0}', github.ref_name) || '' }}
          releaseBody: 'Cross-platform build for Qyra.'
          releaseDraft: ${{ github.ref_type == 'tag' }}
          prerelease: false
          args: ${{ matrix.args }}

      # Strip bundled libwayland from AppImage so it uses the system version on Arch/Wayland.
      # The AppImage bundles its own libwayland-client.so which conflicts with the system's
      # newer version, causing EGL_BAD_PARAMETER crashes on Hyprland and other Wayland compositors.
      - name: Strip bundled libwayland from AppImage
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          [ -z "$APPIMAGE" ] && exit 0
          APPIMAGE=$(realpath "$APPIMAGE")
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract > /dev/null
          find squashfs-root -name "libwayland*.so*" -delete

          # Patch AppRun to auto-set LD_PRELOAD on systems with system libwayland (e.g. Arch + Hyprland)
          if [ -f "squashfs-root/AppRun" ]; then
            printf '%s\n' \
              '# Auto-preload system libwayland if available (fixes Arch/Hyprland EGL crashes)' \
              'if [ -f "/usr/lib/libwayland-client.so" ]; then' \
              '  export LD_PRELOAD="/usr/lib/libwayland-client.so${LD_PRELOAD:+:$LD_PRELOAD}"' \
              'fi' > /tmp/wayland_inject.txt
            if head -1 squashfs-root/AppRun | grep -q '^#!'; then
              { head -1 squashfs-root/AppRun; cat /tmp/wayland_inject.txt; tail -n +2 squashfs-root/AppRun; } > squashfs-root/AppRun.tmp
            else
              { cat /tmp/wayland_inject.txt; cat squashfs-root/AppRun; } > squashfs-root/AppRun.tmp
            fi
            mv squashfs-root/AppRun.tmp squashfs-root/AppRun
          fi
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run squashfs-root "$APPIMAGE"
          rm -rf squashfs-root appimagetool

      - name: Upload build artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: qyra-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload build artifacts (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: qyra-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 30

      - name: Upload build artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: qyra-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error
          retention-days: 30
