name: 'Build Android (Dev Testing)'

# Dev-only workflow: builds a debug APK for sideload testing.
# Triggers on `android-test-*` tags so it does NOT collide with the production
# `v*` release flow, and on manual workflow_dispatch from the Actions tab.

on:
  push:
    tags:
      - 'android-test-*'
  workflow_dispatch:

jobs:
  build-android-dev:
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build deps for mupdf-sys
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            llvm \
            libclang-dev \
            clang \
            libssl-dev \
            make

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.11902837"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.11902837" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: android-dev

      - name: Install frontend dependencies
        run: npm ci

      # mupdf-sys 0.6.0 wrapper/context.c #includes "androidfonts.c" on Android but
      # the crate forgets to ship that file. Pre-fetch the crate and write a stub
      # that installs no-op system font loaders (TOFU + bundled Noto subset cover
      # rendering — no system fonts on Android).
      - name: Patch mupdf-sys for Android
        working-directory: src-tauri
        run: |
          cargo fetch --target aarch64-linux-android
          MUPDF_SYS_DIR=$(find ~/.cargo/registry/src -type d -name 'mupdf-sys-0.6.0' | head -1)
          if [ -z "$MUPDF_SYS_DIR" ]; then
            echo "::error::mupdf-sys-0.6.0 source not found in cargo registry"
            find ~/.cargo/registry/src -maxdepth 4 -type d | head
            exit 1
          fi
          echo "Patching $MUPDF_SYS_DIR/wrapper/androidfonts.c"
          mkdir -p "$MUPDF_SYS_DIR/wrapper"
          cat > "$MUPDF_SYS_DIR/wrapper/androidfonts.c" <<'EOF'
          /* Stub provided by Qyra CI: mupdf-sys 0.6.0 forgot to ship this file.
           * wrapper/context.c references load_droid_font / load_droid_cjk_font /
           * load_droid_fallback_font directly (without the static / namespacing dance the
           * real implementation would have). We provide the three symbols as no-op
           * loaders that return NULL — TOFU + the bundled Noto subset compiled into
           * mupdf cover rendering on Android. No system fonts needed.
           */
          #include "mupdf/fitz.h"

          fz_font *
          load_droid_font(fz_context *ctx, const char *name,
                          int bold, int italic, int needs_exact_metrics)
          {
              (void)ctx; (void)name; (void)bold; (void)italic; (void)needs_exact_metrics;
              return NULL;
          }

          fz_font *
          load_droid_cjk_font(fz_context *ctx, const char *name,
                              int ros, int serif)
          {
              (void)ctx; (void)name; (void)ros; (void)serif;
              return NULL;
          }

          fz_font *
          load_droid_fallback_font(fz_context *ctx, int script, int language,
                                   int serif, int bold, int italic)
          {
              (void)ctx; (void)script; (void)language; (void)serif; (void)bold; (void)italic;
              return NULL;
          }
          EOF
          # Make the file writable in case the registry copy was marked read-only
          chmod -R u+w "$MUPDF_SYS_DIR"

      - name: Build debug APK
        run: npm run tauri android build -- --debug --apk
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: List APK output (debug)
        run: |
          echo "=== APK outputs ==="
          find src-tauri/gen/android/app/build/outputs -name '*.apk' -print

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qyra-android-debug-${{ github.ref_name }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish prerelease with APK
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          name: 'Android dev build — ${{ github.ref_name }}'
          tag_name: ${{ github.ref_name }}
          body: |
            **Unsigned debug APK for sideload testing.**

            Built from branch `dev/android-testing` on commit ${{ github.sha }}.

            Install: download the `.apk` below, enable "Install from unknown sources" for your file manager, tap to install. May need to uninstall any previously installed Qyra debug build first since debug signatures differ.

            Not for production. Use the regular `v*` release for signed builds.
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
