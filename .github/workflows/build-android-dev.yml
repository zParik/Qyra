name: 'Build Android (Dev Testing)'

# Dev-only workflow: builds a debug APK for sideload testing.
# Triggers on `android-test-*` tags so it does NOT collide with the production
# `v*` release flow, and on manual workflow_dispatch from the Actions tab.

on:
  push:
    tags:
      - 'android-test-*'
  workflow_dispatch:

jobs:
  build-android-dev:
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux build deps for mupdf-sys
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            llvm \
            libclang-dev \
            clang \
            libssl-dev \
            make

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Detect active Android NDK
        run: |
          # Tauri/cargo-mobile2 auto-pick the newest installed NDK regardless of env.
          # Detect whichever NDK that is and use it everywhere — pinning to 27 left
          # our LD wrapper out of sync with the toolchain tauri actually used.
          ACTIVE_NDK=$(ls -d $ANDROID_SDK_ROOT/ndk/*/ | sort -V | tail -1)
          ACTIVE_NDK=${ACTIVE_NDK%/}
          echo "Detected NDK: $ACTIVE_NDK"
          echo "NDK_HOME=$ACTIVE_NDK" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ACTIVE_NDK" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ACTIVE_NDK" >> $GITHUB_ENV

      - name: Create aarch64 LD wrapper
        run: |
          # mupdf's Makefile calls $(LD) -r -b binary directly to embed CFF fonts
          # and the hyphenation zip into linker objects. It ignores LDFLAGS env, so
          # we wrap ld.lld in a script that always prepends '-m aarch64linux' to
          # force aarch64 ELF output regardless of how make invokes us.
          mkdir -p /tmp/qyra-bin
          cat > /tmp/qyra-bin/ld <<EOF
          #!/usr/bin/env bash
          exec "${NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/ld.lld" -m aarch64linux "\$@"
          EOF
          chmod +x /tmp/qyra-bin/ld
          echo "QYRA_LD_WRAPPER=/tmp/qyra-bin/ld" >> $GITHUB_ENV

      - name: Stub fontconfig.pc for cross-compile
        run: |
          # yeslogic-fontconfig-sys 6.0.1 always probes pkg-config in its build.rs.
          # FONTCONFIG_NO_PKG_CONFIG doesn't bypass — it just makes pkg-config-rs
          # return Err which the build script then unwrap-panics on. Provide a fake
          # .pc with empty Libs so the probe succeeds with no -lfontconfig link arg;
          # actual fontconfig use is routed through dlopen via RUST_FONTCONFIG_DLOPEN
          # (set in src-tauri/.cargo/config.toml).
          mkdir -p /tmp/qyra-pc
          cat > /tmp/qyra-pc/fontconfig.pc <<'EOF'
          prefix=/usr
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: Fontconfig
          Description: Stub for Android cross-compile (Qyra dev CI)
          Version: 2.14.0
          Libs:
          Cflags:
          EOF
          echo "QYRA_PKG_CONFIG_PATH=/tmp/qyra-pc" >> $GITHUB_ENV

      - name: Generate ephemeral release keystore
        run: |
          # Release builds need a signing config. Dev branch doesn't carry the
          # production keystore secrets, so generate a throwaway one per CI run.
          # Sideloadable APK; obviously NOT for distribution.
          KEYSTORE="$RUNNER_TEMP/qyra-dev.keystore"
          keytool -genkeypair \
            -keystore "$KEYSTORE" \
            -alias qyra-dev \
            -keyalg RSA -keysize 2048 -validity 3650 \
            -storepass qyradev -keypass qyradev \
            -dname "CN=Qyra Dev, OU=Dev, O=Qyra, L=NA, ST=NA, C=NA"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=qyradev" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=qyra-dev" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=qyradev" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: android-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build release APK
        run: npm run tauri android build -- --apk
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          # mupdf-sys 0.6.0 wrapper/context.c does `#ifdef HAVE_ANDROID #include "androidfonts.c"`
          # but the crate forgets to ship androidfonts.c. The cc crate auto-defines
          # HAVE_ANDROID when target_os = android; we append -UHAVE_ANDROID via
          # the target-specific CFLAGS env (which cc appends LAST), undefining the
          # macro after definition so the include + font-install block is skipped.
          # mupdf still ships its own bundled Noto/Droid subset via the TOFU build
          # flags already set by mupdf-sys, so rendering works without system fonts.
          CFLAGS_aarch64_linux_android: -UHAVE_ANDROID
          CFLAGS_armv7_linux_androideabi: -UHAVE_ANDROID
          CFLAGS_i686_linux_android: -UHAVE_ANDROID
          CFLAGS_x86_64_linux_android: -UHAVE_ANDROID
          # mupdf-sys runs bindgen to generate Rust bindings from mupdf headers.
          # bindgen uses libclang which by default picks up the host Linux glibc
          # headers (e.g. /usr/include/features-time64.h that #includes bits/wordsize.h
          # — the latter is x86_64-specific and not in the Android sysroot). Tell
          # libclang to use the NDK sysroot + target triple so it parses Android
          # headers instead.
          BINDGEN_EXTRA_CLANG_ARGS_aarch64_linux_android: --sysroot=${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot --target=aarch64-linux-android24
          BINDGEN_EXTRA_CLANG_ARGS_armv7_linux_androideabi: --sysroot=${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot --target=armv7a-linux-androideabi24
          BINDGEN_EXTRA_CLANG_ARGS_i686_linux_android: --sysroot=${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot --target=i686-linux-android24
          BINDGEN_EXTRA_CLANG_ARGS_x86_64_linux_android: --sysroot=${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot --target=x86_64-linux-android24
          # mupdf's Makefile embeds *.cff fonts + hyph-all.zip into linker objects via
          # `ld -r -b binary`. mupdf-sys's make.rs only forwards CC + XCFLAGS to make,
          # NOT LD. Plain `LD=ld.lld` would still emit host-arch objects because make
          # ignores LDFLAGS env. We use a wrapper that always prepends '-m aarch64linux'.
          LD: ${{ env.QYRA_LD_WRAPPER }}
          # Force pkg-config to find our fake fontconfig.pc (empty Libs). Without
          # this and PKG_CONFIG_ALLOW_CROSS, yeslogic-fontconfig-sys's build.rs
          # panics on cross-compile.
          PKG_CONFIG_PATH: ${{ env.QYRA_PKG_CONFIG_PATH }}
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_ALLOW_CROSS_aarch64_linux_android: "1"

      - name: List APK output (debug)
        run: |
          echo "=== APK outputs ==="
          find src-tauri/gen/android/app/build/outputs -name '*.apk' -print

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: qyra-android-${{ github.ref_name }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish prerelease with APK
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          name: 'Android dev build — ${{ github.ref_name }}'
          tag_name: ${{ github.ref_name }}
          body: |
            **Release APK signed with an ephemeral dev keystore for sideload testing.**

            Built from branch `dev/android-testing` on commit ${{ github.sha }}.

            Install: download the `.apk` below, enable "Install from unknown sources" for your file manager, tap to install. The signing key is regenerated per CI run, so you may need to uninstall any prior dev build (signatures will mismatch) before installing this one.

            Not signed with the production key. Use the regular `v*` release for Play-Store-grade signed builds.
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
