name: 'Build macOS'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install macOS targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install macOS dependencies
        run: brew install tesseract leptonica

      - name: Set macOS deployment target
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV
          echo "CFLAGS_aarch64_apple_darwin=-mmacosx-version-min=10.15" >> $GITHUB_ENV
          echo "CFLAGS_x86_64_apple_darwin=-mmacosx-version-min=10.15" >> $GITHUB_ENV
          echo "CXXFLAGS_aarch64_apple_darwin=-mmacosx-version-min=10.15" >> $GITHUB_ENV
          echo "CXXFLAGS_x86_64_apple_darwin=-mmacosx-version-min=10.15" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Qyra {0}', github.ref_name) || '' }}
          releaseBody: 'macOS build for Qyra.'
          releaseDraft: ${{ github.ref_type == 'tag' }}
          prerelease: false
          args: '--target universal-apple-darwin'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qyra-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error
          retention-days: 30
