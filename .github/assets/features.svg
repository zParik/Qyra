<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" width="1280" height="520" role="img" aria-label="Qyra features">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0e"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1d"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>
    <pattern id="grid2" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="520" fill="url(#bg2)"/>
  <rect width="1280" height="520" fill="url(#grid2)"/>

  <g font-family="Inter, Geist, system-ui, sans-serif">
    <text x="64" y="64" font-size="28" font-weight="700" fill="#ededee" letter-spacing="-0.4">
      Everything Acrobat does. None of the cloud.
    </text>
    <text x="64" y="92" font-size="14" font-weight="400" fill="#9fa0a4">
      Your files never leave the machine.
    </text>
    <rect x="64" y="104" width="40" height="2" rx="1" fill="#e8a14b"/>
  </g>

  <!-- Cards. Single amber accent on icon backgrounds matches the viewer's hover/aria-current state. -->
  <g font-family="Inter, Geist, system-ui, sans-serif">
    <!-- Row 1 -->
    <g transform="translate(64,140)">
      <rect width="280" height="160" rx="6" fill="url(#card)" stroke="#2a2a2f"/>
      <rect x="20" y="20" width="40" height="40" rx="4" fill="#e8a14b" fill-opacity="0.14"/>
      <g stroke="#e8a14b" stroke-width="2" stroke-linecap="round" fill="none">
        <path d="M30 35 h20 M30 41 h20 M30 47 h12"/>
      </g>
      <text x="72" y="46" font-size="16" font-weight="700" fill="#ededee">Tabbed Viewer</text>
      <text x="20" y="90"  font-size="12.5" fill="#9fa0a4">Multi-doc tabs, thumbnails,</text>
      <text x="20" y="106" font-size="12.5" fill="#9fa0a4">search, outline, zoom, rotate.</text>
      <text x="20" y="138" font-size="11" font-family="ui-monospace, monospace" fill="#6b6c70">react-virtual · mupdf</text>
    </g>
    <g transform="translate(360,140)">
      <rect width="280" height="160" rx="6" fill="url(#card)" stroke="#2a2a2f"/>
      <rect x="20" y="20" width="40" height="40" rx="4" fill="#e8a14b" fill-opacity="0.14"/>
      <path d="M28 50 q6 -18 14 -8 q4 6 10 -8" stroke="#e8a14b" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="72" y="46" font-size="16" font-weight="700" fill="#ededee">Annotate</text>
      <text x="20" y="90"  font-size="12.5" fill="#9fa0a4">Ink, highlight, notes, shapes,</text>
      <text x="20" y="106" font-size="12.5" fill="#9fa0a4">stamps, forms, redaction.</text>
      <text x="20" y="138" font-size="11" font-family="ui-monospace, monospace" fill="#6b6c70">perfect-freehand · flatten</text>
    </g>
    <g transform="translate(656,140)">
      <rect width="280" height="160" rx="6" fill="url(#card)" stroke="#2a2a2f"/>
      <rect x="20" y="20" width="40" height="40" rx="4" fill="#e8a14b" fill-opacity="0.14"/>
      <g stroke="#e8a14b" stroke-width="2" stroke-linecap="round">
        <path d="M28 32 h24 M28 40 h24 M28 48 h14"/>
      </g>
      <text x="72" y="46" font-size="16" font-weight="700" fill="#ededee">Page Ops</text>
      <text x="20" y="90"  font-size="12.5" fill="#9fa0a4">Merge, split, reorder, rotate,</text>
      <text x="20" y="106" font-size="12.5" fill="#9fa0a4">crop, remove, page numbers.</text>
      <text x="20" y="138" font-size="11" font-family="ui-monospace, monospace" fill="#6b6c70">drag-and-drop reorder</text>
    </g>
    <g transform="translate(952,140)">
      <rect width="264" height="160" rx="6" fill="url(#card)" stroke="#2a2a2f"/>
      <rect x="20" y="20" width="40" height="40" rx="4" fill="#e8a14b" fill-opacity="0.14"/>
      <path d="M28 35 l8 9 l16 -16" stroke="#e8a14b" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="72" y="46" font-size="16" font-weight="700" fill="#ededee">OCR</text>
      <text x="20" y="90"  font-size="12.5" fill="#9fa0a4">Searchable text from scans,</text>
      <text x="20" y="106" font-size="12.5" fill="#9fa0a4">fully offline.</text>
      <text x="20" y="138" font-size="11" font-family="ui-monospace, monospace" fill="#6b6c70">tesseract.js</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(64,320)">
      <rect width="280" height="160" rx="6" fill="url(#card)" stroke="#2a2a2f"/>
      <rect x="20" y="20" width="40" height="40" rx="4" fill="#e8a14b" fill-opacity="0.14"/>
      <g stroke="#e8a14b" stroke-width="2" stroke-linecap="round" fill="none">
        <path d="M28 30 v20 M28 30 h16 M28 40 h12 M28 50 h16"/>
      </g>
      <text x="72" y="46" font-size="16" font-weight="700" fill="#ededee">Convert</text>
      <text x="20" y="90"  font-size="12.5" fill="#9fa0a4">PDF &#8596; images, PDF &#8594; text,</text>
      <text x="20" y="106" font-size="12.5" fill="#9fa0a4">PDF &#8594; Word (.docx).</text>
      <text x="20" y="138" font-size="11" font-family="ui-monospace, monospace" fill="#6b6c70">native mupdf pipeline</text>
    </g>
    <g transform="translate(360,320)">
      <rect width="280" height="160" rx="6" fill="url(#card)" stroke="#2a2a2f"/>
      <rect x="20" y="20" width="40" height="40" rx="4" fill="#e8a14b" fill-opacity="0.14"/>
      <g stroke="#e8a14b" stroke-width="2" fill="none">
        <path d="M30 36 v-4 a10 10 0 0 1 20 0 v4"/>
        <rect x="26" y="36" width="28" height="18" rx="2"/>
      </g>
      <text x="72" y="46" font-size="16" font-weight="700" fill="#ededee">Protect</text>
      <text x="20" y="90"  font-size="12.5" fill="#9fa0a4">Encrypt, unlock, compress,</text>
      <text x="20" y="106" font-size="12.5" fill="#9fa0a4">watermark, redact.</text>
      <text x="20" y="138" font-size="11" font-family="ui-monospace, monospace" fill="#6b6c70">aes-128 / aes-256</text>
    </g>
    <g transform="translate(656,320)">
      <rect width="280" height="160" rx="6" fill="url(#card)" stroke="#2a2a2f"/>
      <rect x="20" y="20" width="40" height="40" rx="4" fill="#e8a14b" fill-opacity="0.14"/>
      <path d="M24 36 l16 -6 l16 6 v12 l-16 6 l-16 -6 z" stroke="#e8a14b" stroke-width="2" fill="none"/>
      <text x="72" y="46" font-size="16" font-weight="700" fill="#ededee">Native Speed</text>
      <text x="20" y="90"  font-size="12.5" fill="#9fa0a4">Rust backend, MuPDF core,</text>
      <text x="20" y="106" font-size="12.5" fill="#9fa0a4">Tauri shell. Small binary.</text>
      <text x="20" y="138" font-size="11" font-family="ui-monospace, monospace" fill="#6b6c70">~15mb installer</text>
    </g>
    <g transform="translate(952,320)">
      <rect width="264" height="160" rx="6" fill="url(#card)" stroke="#2a2a2f"/>
      <rect x="20" y="20" width="40" height="40" rx="4" fill="#e8a14b" fill-opacity="0.14"/>
      <path d="M24 50 l8 -16 l8 8 l8 -14" stroke="#e8a14b" stroke-width="2" fill="none" stroke-linecap="round"/>
      <text x="72" y="46" font-size="16" font-weight="700" fill="#ededee">Cross-platform</text>
      <text x="20" y="90"  font-size="12.5" fill="#9fa0a4">Windows, Linux, Android.</text>
      <text x="20" y="106" font-size="12.5" fill="#9fa0a4">macOS builds from source.</text>
      <text x="20" y="138" font-size="11" font-family="ui-monospace, monospace" fill="#6b6c70">tauri 2 · react 19</text>
    </g>
  </g>
</svg>
